<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Demanda</title>
    <style>
        /* Centraliza tudo na tela */
        body {
            background-color: #2c3e50; /* Fundo escuro para destacar a borda branca */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .aviso {
            border: 3px solid white;    /* A borda branca que você pediu */
            padding: 30px 50px;         /* Espaço interno para o texto não sufocar */
            border-radius: 15px;        /* Arredonda os cantos */
            color: white;               /* Cor do texto */
            text-align: center;         /* Centraliza o texto dentro da caixa */
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;  /* Deixa em letras maiúsculas para dar destaque */
        }
        
    </style>
</head>
<body>

    <div class="aviso">
        ATRASO DEVIDO A ALTA DEMANDA
    </div>

</body>
</html>
